name: doc_to_pdf_demo
description: "File → PDF using syncfusion_flutter_pdf + helpers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  syncfusion_flutter_pdf: ^32.2.9
  archive: ^3.6.1
  excel: ^4.0.6
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.2
  open_file: ^3.3.2
  google_mlkit_document_scanner: ^0.4.1
  cunning_document_scanner: ^1.4.0
  image_cropper: ^11.0.0
  doc_scan_flutter: ^1.0.6
  flutter_reorderable_grid_view: ^5.6.0
  reorderable_grid_view: ^2.2.8

dependency_overrides:
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true